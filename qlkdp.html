<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải ứng dụng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f5f5f5;
        }
        h1 {
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
        }
        .android {
            background-color: #3ddc84;
        }
        .ios {
            background-color: #000000;
        }
    </style>
</head>
<body>

    <h1>Tải ứng dụng Điều Hành Khu Phố</h1>

    <a class="btn android" href="https://play.google.com/store/apps/details?id=vn.vnpt.smarttown.demo&hl=vi" target="_blank">
        Tải cho Android
    </a>

    <a class="btn ios" href="https://apps.apple.com/vn/app/id6745533802?l=vi" target="_blank">
        Tải cho iOS
    </a>

</body>
</html>
