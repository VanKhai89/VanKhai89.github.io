<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải ứng dụng</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 100px;
        }

        img {
            height: 60px;
            margin: 10px;
            transition: transform 0.2s;
        }

        img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Đang chuyển hướng tải ứng dụng...</h1>
    <p>Nếu không tự chuyển, hãy chọn bên dưới:</p>

    <div>
        <a href="https://apps.apple.com/vn/app/c%C6%B0-d%C3%A2n-s%E1%BB%91/id6748723039">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg">
        </a>

        <a href="https://play.google.com/store/apps/details?id=vn.vnpt.smarttown.cudanso&hl=vi">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
        </a>
    </div>
</div>

<script>
    function detectDeviceAndRedirect() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;

        // Android
        if (/android/i.test(userAgent)) {
            window.location.href = "https://play.google.com/store/apps/details?id=vn.vnpt.smarttown.demo&hl=vi";
        }
        // iOS
        else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            window.location.href = "https://apps.apple.com/vn/app/id6745533802?l=vi";
        }
    }

    // Delay nhẹ cho mượt
    setTimeout(detectDeviceAndRedirect, 500);
</script>

</body>
</html>
