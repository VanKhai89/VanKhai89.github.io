<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 100px;
        }

        .store-buttons img {
            height: 60px;
            margin: 10px;
            transition: transform 0.2s;
        }

        .store-buttons img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Đang chuyển hướng...</h1>
    <p>Nếu không tự chuyển, chọn bên dưới:</p>

    <div class="store-buttons">
        <a id="iosLink" target="_blank">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg">
        </a>

        <a id="androidLink" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
        </a>
    </div>
</div>

<script>
    // ===== CONFIG (chỉ sửa ở đây) =====
    const CONFIG = {
        android: "https://play.google.com/store/apps/details?id=vn.vnpt.smarttown.cudanso&hl=vi",
        ios: "https://apps.apple.com/vn/app/id6748723039"
    };

    // Gán link cho button
    document.getElementById("androidLink").href = CONFIG.android;
    document.getElementById("iosLink").href = CONFIG.ios;

    function detectAndRedirect() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        if (/android/i.test(ua)) {
            window.location.href = CONFIG.android;
        } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
            window.location.href = CONFIG.ios;
        }
    }

    // Delay chút cho user thấy UI
    setTimeout(detectAndRedirect, 500);
</script>

</body>
</html>
